<link rel="stylesheet" href="css/style.css">


<link rel="manifest" href="manifest.json">

<body>


<div class="container">


<h1>
📦 仓库管理系统
</h1>

<div class="search-box">

<input 
id="searchInput"
placeholder="输入款号查询">


</div>


<div id="searchResult">

</div>


</section>

<section id="managePage"
class="hide">

</h2>


<button onclick="showAddInventory()">
添加库存
</button>


<div id="inventoryList">

</div>

class="hide">

📝 添加备忘
</h2>


<button onclick="openMemo()">
➕ 添加备忘
</button>


<div id="memoList">

</div>


</section>






<!-- 底部 -->


<div class="bottom-nav">


<button onclick="switchPage('search')">
🔍 查询
</button>


<button onclick="switchPage('manage')">
⚙️ 管理
</button>


<button onclick="switchPage('memo')">
📝 备忘
</button>


<button onclick="switchPage('logistics')">
🚚 物流
</button>

</button>


</div>



</div>
